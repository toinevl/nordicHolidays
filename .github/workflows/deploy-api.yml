name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set API app settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ vars.SWEDEN_TRAVEL_FUNCTION_APP_NAME }}
          resource-group: rgWebsite
          app-settings: |
            ENTRA_ISSUER_HOST=${{ secrets.ENTRA_ISSUER_HOST ?? 'login.microsoftonline.com' }}
            ENTRA_API_AUDIENCE=${{ secrets.ENTRA_API_AUDIENCE }}
            ENTRA_REQUIRED_SCOPE=${{ secrets.ENTRA_REQUIRED_SCOPE ?? 'user_impersonation' }}

      - name: Package and deploy
        working-directory: api
        run: |
          zip -r ../api.zip . -x "node_modules/*" -x "dist/*" -x "local.settings.json"
          az functionapp deployment source config-zip \
            --resource-group rgWebsite \
            --name ${{ vars.SWEDEN_TRAVEL_FUNCTION_APP_NAME }} \
            --src ../api.zip \
            --build-remote true
