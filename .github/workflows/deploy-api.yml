name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set API app settings
        run: |
          az functionapp config appsettings set \
            --resource-group rgNordicHolidays \
            --name ${{ vars.NORDIC_HOLIDAYS_FUNCTION_APP_NAME }} \
            --settings \
              ENTRA_ISSUER_HOST="${ENTRA_ISSUER_HOST:-login.microsoftonline.com}" \
              ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
              ENTRA_REQUIRED_SCOPE="${ENTRA_REQUIRED_SCOPE:-user_impersonation}" \
              ALLOWED_ORIGINS="${ALLOWED_ORIGINS:-https://sweden.van-vliet.eu,http://localhost:5173}"
        env:
          ENTRA_ISSUER_HOST: ${{ secrets.ENTRA_ISSUER_HOST || 'login.microsoftonline.com' }}
          ENTRA_API_AUDIENCE: ${{ secrets.ENTRA_API_AUDIENCE }}
          ENTRA_REQUIRED_SCOPE: ${{ secrets.ENTRA_REQUIRED_SCOPE || 'user_impersonation' }}
          # App-level CORS allow-list (api/src/lib/cors.ts). Platform CORS on the Function
          # App governs the browser preflight in prod; this keeps the app layer consistent
          # (and silences its "falling back to localhost" warning). Local dev still works
          # via the localhost fallback when this is unset.
          ALLOWED_ORIGINS: ${{ vars.NORDIC_HOLIDAYS_ALLOWED_ORIGINS || 'https://sweden.van-vliet.eu,http://localhost:5173' }}

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Package API
        working-directory: api
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp package.json deploy/
          cp package-lock.json deploy/ || true
          cp host.json deploy/
          cp -r dist deploy/dist
          cp -r node_modules deploy/node_modules
          cd deploy
          zip -r ../../api.zip .
          cd ..
          rm -rf deploy

      - name: Deploy API
        run: az functionapp deployment source config-zip --resource-group rgNordicHolidays --name ${{ vars.NORDIC_HOLIDAYS_FUNCTION_APP_NAME }} --src ./api.zip --build-remote false

      - name: Smoke test API
        run: |
          API_URL="https://nordic-holidays-api.azurewebsites.net/api"
          MAX_RETRIES=20
          RETRY_DELAY=15

          expect() {
            local expected_code=$1
            shift
            local response=$(curl -s -w "\n%{http_code}" "$@")
            local body=$(echo "$response" | head -n -1)
            local status=$(echo "$response" | tail -n 1)

            if [ "$status" = "$expected_code" ]; then
              echo "✓ GET $* → $status (expected $expected_code)"
              return 0
            else
              echo "✗ GET $* → $status (expected $expected_code)"
              echo "Response body: $body"
              return 1
            fi
          }

          echo "Starting API smoke tests..."

          # Test 1: Health check with retry (cold start)
          HEALTH_OK=0
          for i in $(seq 1 $MAX_RETRIES); do
            if expect 200 "$API_URL/health"; then
              HEALTH_OK=1
              break
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retry $i/$MAX_RETRIES, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          if [ "$HEALTH_OK" != "1" ]; then
            echo "✗ Health check failed after $MAX_RETRIES attempts"
            exit 1
          fi

          # Test 2: GET /itineraries with an X-Owner-Id header (still accepted, though
          # itineraries are public and no longer scoped by it)
          expect 200 "$API_URL/itineraries" \
            -H "X-Owner-Id: owner-00000000-0000-4000-8000-000000000000"

          # Test 3: GET /itineraries without any owner header — itineraries are fully
          # public (#47), so this must be 200, not the old pre-#47 401.
          expect 200 "$API_URL/itineraries"

          # Test 4: POST /itineraries with invalid body (should 400)
          expect 400 "$API_URL/itineraries" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Owner-Id: owner-00000000-0000-4000-8000-000000000000" \
            -d '{"bad":"body"}'

          # Test 5: GET /itineraries/{id} for a real saved itinerary. This exercises the
          # actual HTTP response path through the live Functions host (unlike the Vitest
          # unit/integration suite, which calls handlers in-process and never serializes
          # real HTTP headers) — the only way to catch host-level response defects like
          # the non-ASCII-header 500 this smoke test previously missed.
          FIRST_ID=$(curl -s "$API_URL/itineraries" | node -e "
            let data = '';
            process.stdin.on('data', d => data += d);
            process.stdin.on('end', () => {
              const list = JSON.parse(data);
              if (list.length > 0) process.stdout.write(list[0].id);
            });
          ")
          if [ -n "$FIRST_ID" ]; then
            expect 200 "$API_URL/itineraries/$FIRST_ID"
          else
            echo "⚠ No saved itineraries to test GET /itineraries/{id} against — skipping Test 5"
          fi

          echo "All API smoke tests passed!"
