name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build frontend
        run: cd frontend && npm ci && npm run build

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Install & build API
        run: cd api && npm ci && npx tsc --noEmit

      - name: Run API tests
        run: cd api && npm test

      - name: Verify IaC platform CORS includes prod origin (#36)
        run: |
          az bicep build --file infra/main.bicep --outfile /tmp/main.json
          node infra/scripts/verify-cors.mjs /tmp/main.json
