name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Stamp build metadata
        run: |
          cat > frontend/public/build-info.json <<EOF
          {
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF_NAME}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Smoke test frontend
        run: |
          FRONTEND_URL="https://zealous-forest-053645a03.7.azurestaticapps.net/"
          MAX_RETRIES=6
          RETRY_DELAY=10

          echo "Starting frontend smoke tests..."

          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" "$FRONTEND_URL")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "200" ]; then
              # Check for stable markers in the HTML
              if echo "$body" | grep -q '<div id="status-bar"'; then
                echo "✓ Frontend is live (200) with expected marker"
                exit 0
              else
                echo "✗ Frontend returned 200 but missing expected marker"
                exit 1
              fi
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i/$MAX_RETRIES returned $status, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Frontend failed all $MAX_RETRIES attempts"
          exit 1
