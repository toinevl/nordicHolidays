name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Stamp build metadata
        run: |
          cat > frontend/public/build-info.json <<EOF
          {
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF_NAME}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Generate SEO itinerary library (#73)
        run: npx tsx ../scripts/generate-seo-pages.ts
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}
          # Travelpayouts affiliate marker from the TRAVELPAYOUTS_MARKER repo *variable*
          # (not a secret — markers aren't sensitive). Unset → empty → plain non-affiliate links.
          VITE_TRAVELPAYOUTS_MARKER: ${{ vars.TRAVELPAYOUTS_MARKER }}
          # GetYourGuide partner id (#71) and DiscoverCars affiliate id (#72), same
          # repo-variable pattern. Unset → empty → plain non-affiliate links.
          VITE_GYG_PARTNER_ID: ${{ vars.GYG_PARTNER_ID }}
          VITE_DISCOVERCARS_AID: ${{ vars.DISCOVERCARS_AID }}

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Smoke test frontend
        run: |
          FRONTEND_URL="${{ vars.NORDIC_HOLIDAYS_SWA_URL }}"
          MAX_RETRIES=6
          RETRY_DELAY=10

          echo "Starting frontend smoke tests..."

          for i in $(seq 1 $MAX_RETRIES); do
            response=$(curl -s -w "\n%{http_code}" "$FRONTEND_URL")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "200" ]; then
              # Check for stable markers in the HTML
              if echo "$body" | grep -q '<div id="status-bar"'; then
                echo "✓ Frontend is live (200) with expected marker"
                exit 0
              else
                echo "✗ Frontend returned 200 but missing expected marker"
                exit 1
              fi
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Attempt $i/$MAX_RETRIES returned $status, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Frontend failed all $MAX_RETRIES attempts"
          exit 1
